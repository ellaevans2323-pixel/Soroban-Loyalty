services:
  backend:
    volumes:
      - ./backend:/app:cached
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development

  frontend:
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NODE_ENV: development
