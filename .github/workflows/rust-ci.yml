name: Rust Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81.0"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run fuzz / property-based tests (10 000 cases each)
        env:
          PROPTEST_CASES: "10000"
        run: cargo test --package soroban-loyalty-token fuzz_ -- --test-threads=1

      - name: Build contracts (wasm32)
        run: cargo build --target wasm32-unknown-unknown --release --workspace
