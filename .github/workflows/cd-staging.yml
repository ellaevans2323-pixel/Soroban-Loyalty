name: CD - Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  ci-check:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check CI workflow status
        uses: actions/github-script@v9
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
            });

            if (runs.workflow_runs.length === 0) {
              throw new Error('CI workflow has not completed yet');
            }

            const latestRun = runs.workflow_runs[0];
            if (latestRun.conclusion !== 'success') {
              throw new Error(`CI workflow failed with conclusion: ${latestRun.conclusion}`);
            }

  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: ci-check
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.backend_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy to staging
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          STAGING_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
          STAGING_PROJECT_ID: ${{ secrets.RAILWAY_STAGING_PROJECT_ID }}
        run: |
          # Install Railway CLI
          npm install -g @railway/cli

          # Deploy using Railway
          railway up \
            --service $STAGING_SERVICE_ID \
            --project $STAGING_PROJECT_ID \
            --detach

          # Get deployment URL
          BACKEND_URL=$(railway status --service $STAGING_SERVICE_ID --project $STAGING_PROJECT_ID | grep -oP 'https://[^\s]+' | head -1)
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Report deployment status
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              description: `Backend deployment to staging ${status}`,
              context: 'deployment/backend',
              target_url: '${{ steps.deploy.outputs.backend_url }}',
            });

  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    needs: ci-check
    timeout-minutes: 20
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Vercel staging
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel

          # Deploy to staging environment
          FRONTEND_URL=$(vercel deploy \
            --token=$VERCEL_TOKEN \
            --prod \
            --build-env NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }} \
            --env NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }} \
            2>&1 | grep -oP 'https://[^\s]+' | head -1)

          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT

      - name: Report deployment status
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              description: `Frontend deployment to staging ${status}`,
              context: 'deployment/frontend',
              target_url: '${{ steps.deploy.outputs.frontend_url }}',
            });

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Create deployment summary
        uses: actions/github-script@v9
        with:
          script: |
            const backendStatus = '${{ needs.deploy-backend.result }}';
            const frontendStatus = '${{ needs.deploy-frontend.result }}';

            const summary = `
            ## 🚀 Staging Deployment Summary

            | Component | Status |
            |-----------|--------|
            | Backend | ${{ needs.deploy-backend.result === 'success' ? '✅ Success' : '❌ Failed' }} |
            | Frontend | ${{ needs.deploy-frontend.result === 'success' ? '✅ Success' : '❌ Failed' }} |

            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref }}
            **Triggered by**: ${{ github.actor }}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary,
            });

      - name: Fail if any deployment failed
        if: needs.deploy-backend.result != 'success' || needs.deploy-frontend.result != 'success'
        run: exit 1
