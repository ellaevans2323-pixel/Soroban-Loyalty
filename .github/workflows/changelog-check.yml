name: Check CHANGELOG Update

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main, develop]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if CHANGELOG was updated
        id: changelog_check
        run: |
          # Get the list of changed files
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check if CHANGELOG.md is in the changed files
          if echo "$CHANGED_FILES" | grep -q "CHANGELOG.md"; then
            echo "✅ CHANGELOG.md has been updated"
            echo "changelog_updated=true" >> $GITHUB_OUTPUT
          else
            echo "❌ CHANGELOG.md has NOT been updated"
            echo "changelog_updated=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Validate CHANGELOG format
        if: steps.changelog_check.outputs.changelog_updated == 'true'
        run: |
          # Check for Unreleased section
          if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
            echo "❌ ERROR: Missing [Unreleased] section in CHANGELOG.md"
            exit 1
          fi
          echo "✅ CHANGELOG format is valid"
      
      - name: Comment on PR if CHANGELOG not updated
        if: steps.changelog_check.outputs.changelog_updated == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 **Reminder:** Please update `CHANGELOG.md` with your changes under the `[Unreleased]` section.\n\nCategories: `Added`, `Changed`, `Deprecated`, `Removed`, `Fixed`, or `Security`.'
            })
      
      - name: Fail PR if CHANGELOG not updated
        if: steps.changelog_check.outputs.changelog_updated == 'false'
        run: |
          echo "❌ This PR requires a CHANGELOG.md update"
          echo "Please add your changes to CHANGELOG.md under [Unreleased]"
          exit 1
