name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-ci:
    name: Backend - Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: loyalty
          POSTGRES_PASSWORD: loyalty
          POSTGRES_DB: loyalty
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty
      TEST_DATABASE_URL: postgresql://loyalty:loyalty@localhost:5432/loyalty_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run migrations
        run: npm run migrate:up

      - name: Create dedicated integration test database
        run: psql $DATABASE_URL -c "CREATE DATABASE loyalty_test;"

      - name: Apply test DB schema
        run: psql $TEST_DATABASE_URL -f ../database/schema.sql

      - name: Run unit tests
        run: npm test -- --ci --coverage

      - name: Run integration tests
        run: npm run test:integration -- --ci

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-coverage
          path: backend/coverage/
          retention-days: 7

  frontend-ci:
    name: Frontend - Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-test-coverage
          path: frontend/coverage/
          retention-days: 7

  contracts-ci:
    name: Rust Contracts - Test & Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run tests
        run: cargo test --all

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings

  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, contracts-ci]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.backend-ci.result }}" != "success" ] || \
             [ "${{ needs.frontend-ci.result }}" != "success" ] || \
             [ "${{ needs.contracts-ci.result }}" != "success" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
